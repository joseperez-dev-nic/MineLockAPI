# =====================================================================
# Configuración del sincronizador Rampa Segura (local -> nube)
# =====================================================================
# Ruta en produccion: /etc/rampasegura/sync.conf
# Tras cambiar algo aqui:  sudo systemctl restart rampasegura-sync
#
# Los intervalos van en SEGUNDOS. Pon 0 para DESACTIVAR una sincronizacion.
# =====================================================================

# --- Conexion a la API -----------------------------------------------
# URL base donde corre la API LOCAL (la que ve la base de datos local).
API_BASE="http://localhost:5285"

# Debe coincidir con "ApiKey" del appsettings.json de la API.
API_KEY="115723f2-7400-4e2c-a0c9-b27e45ec05bc932cc427-f496-4e08-958e-3a9c69b5088c"

# Segundos maximos que se espera a la API antes de abortar el intento.
# Subelo si sincronizas muchas fotos (son pesadas).
CURL_TIMEOUT=180


# --- Verificacion de conexion a la nube ------------------------------
# Antes de cada sincronizacion se comprueba que el servidor pueda ALCANZAR
# la nube (conexion TCP a host:puerto). Si no hay conexion, la sincronizacion
# se pone en PAUSA y se reintenta sola cuando vuelva. Nada se pierde.
#
# Por defecto se prueba el MySQL de la nube (lo que de verdad usa el sync).
# Si prefieres solo "hay internet", pon CHECK_HOST="8.8.8.8" y CHECK_PORT=53.
# Deja CHECK_HOST vacio ("") para DESACTIVAR la verificacion (siempre intenta).
CHECK_HOST="185.225.232.107"
CHECK_PORT=3307
CHECK_TIMEOUT=3


# --- Cada cuanto se sincroniza cada cosa (en SEGUNDOS) ----------------

# Marcajes de entrada/salida. Es lo unico casi en tiempo real.
# Incremental (solo is_synced = 0), asi que es barato.
INTERVAL_ATTENDANCE=10

# Catalogo de personal. Envia todas las personas cada vez: no lo bajes mucho.
INTERVAL_PERSON=1200          # 5 min

# Fotos de perfil. Incremental, pero son blobs pesados.
INTERVAL_PHOTO=600           # 10 min

# Roles + usuarios de la aplicacion. Cambian muy poco.
INTERVAL_APPUSER=2400         # 40 min

# Umbrales de advertencia/turno. Cambian muy poco.
INTERVAL_ALERTTHRESHOLD=1200  # 20 min

# Bitacoras (sync_log + audit_log). Envia todo el historico: dejalo alto.
INTERVAL_SYNCLOG=7200        # 2 horas


# --- Registro ---------------------------------------------------------
# Con systemd los logs van al journal (journalctl). Pon 1 para ver tambien
# las sincronizaciones exitosas; con 0 solo se registran los errores.
LOG_SUCCESS=0
